<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outdoor - Thank You</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        .thank-you-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            text-align: center;
        }

        .success-icon {
            color: var(--color-accent);
            width: 80px;
            height: 80px;
            margin-bottom: 32px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .thank-you-container h1 {
            font-size: 2.5rem;
            margin-bottom: 16px;
        }

        .thank-you-container p {
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .stat-box {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 40px;
            width: 100%;
        }

        .stat-box span {
            color: var(--color-accent);
            font-weight: 900;
            font-size: 2rem;
            display: block;
            margin-bottom: 8px;
        }

        .return-btn {
            background: transparent;
            border: 2px solid #ffffff;
            color: #ffffff;
        }

        .return-btn:hover {
            background: #ffffff;
            color: var(--color-bg);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo-text">
                <img src="logo.png" alt="Outdoor Logo">
                <span><span style="color: var(--color-accent);">O</span><span style="color: #ffffff;">utdoor</span></span>
            </div>
        </header>

        <main class="thank-you-container">
            <svg class="success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
            <h1>You're on the list!</h1>
            <p class="hero-sub" style="margin-bottom: 24px;">Keep an eye on your inbox for early access updates.</p>

            <div class="stat-box">
                <span id="thank-you-count" style="color: #00C27A;">...</span>
                Welcome to the Fam! You are this person on the waitlist.
            </div>

            <a href="index.html" style="width: 100%;">
                <button class="return-btn">Return Home</button>
            </a>
        </main>
    </div>

    <script>
        const totalSubmissions = localStorage.getItem('outdoor_total_submissions');
        if (totalSubmissions) {
            document.getElementById('thank-you-count').innerText = totalSubmissions;
        } else {
            // Fallback if accessed directly
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
